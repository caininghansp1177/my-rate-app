<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>极简汇率 Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="极简汇率">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.5);
            --ios-blue: #0A84FF;
        }
        
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: calc(40px + env(safe-area-inset-top)) 20px 40px 20px;
            min-height: 100vh;
        }

        .header {
            margin-bottom: 28px;
            padding-left: 4px;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 6px 0;
            background: linear-gradient(to right, #ffffff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        .update-time {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .currency-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* 核心毛玻璃卡片 */
        .currency-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        /* 卡片上方的微光流线效果 */
        .currency-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
        }

        /* 当某个卡片被点击激活输入时的 iOS 极光蓝高亮风格 */
        .currency-card.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--ios-blue);
            box-shadow: 0 0 15px rgba(10, 132, 255, 0.2);
            transform: scale(1.01);
        }

        .currency-info {
            display: flex;
            flex-direction: column;
            pointer-events: none; /* 让点击穿透到卡片本身 */
        }

        .currency-code {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .currency-name {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 500;
        }

        .input-section {
            text-align: right;
            flex-grow: 1;
            max-width: 65%;
        }

        .input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        /* 隐藏原生输入框边框，使其融入卡片 */
        input {
            width: 100%;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-size: 26px;
            font-weight: 600;
            text-align: right;
            padding: 0;
            outline: none;
            font-family: "SF Pro Display", -apple-system, sans-serif;
        }

        /* 未激活状态下的数字颜色稍淡，突出输入态 */
        .currency-card:not(.active) input {
            color: rgba(255, 255, 255, 0.95);
            cursor: pointer;
        }

        .rate-memo {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>极简汇率 Pro</h1>
        <div class="update-time" id="updateTime">正在连接欧洲中央银行数据...</div>
    </div>

    <div class="currency-container" id="currencyContainer">
        </div>

    <script>
        // 9种目标货币配置
        const currencies = [
            { code: 'CNY', name: '人民币', symbol: '¥' },
            { code: 'USD', name: '美元', symbol: '$' },
            { code: 'CAD', name: '加元', symbol: 'C$' },
            { code: 'JPY', name: '日元', symbol: '¥' },
            { code: 'EUR', name: '欧元', symbol: '€' },
            { code: 'GBP', name: '英镑', symbol: '£' },
            { code: 'SGD', name: '新加坡元', symbol: 'S$' },
            { code: 'AUD', name: '澳大利亚元', symbol: 'A$' },
            { code: 'HKD', name: '港币', symbol: 'HK$' }
        ];

        // 默认全套最新基准汇率（以旧USD为桥梁建立的全网底座，确保断网也能完美运转）
        let exchangeRates = {
            "CNY": 7.25, "USD": 1.0, "CAD": 1.37, "JPY": 158.5, 
            "EUR": 0.93, "GBP": 0.79, "SGD": 1.35, "AUD": 1.51, "HKD": 7.81
        };

        let currentActiveCode = 'CNY'; // 当前正在输入的币种，默认人民币
        let currentInputValue = 100;   // 当前输入的数值

        // 初始化渲染基础架构
        function initApp() {
            const container = document.getElementById('currencyContainer');
            container.innerHTML = '';

            currencies.forEach(item => {
                const isCardActive = item.code === currentActiveCode;
                
                const cardHtml = `
                    <div class="currency-card ${isCardActive ? 'active' : ''}" id="card-${item.code}" onclick="focusCard('${item.code}')">
                        <div class="currency-info">
                            <span class="currency-code">${item.code}</span>
                            <span class="currency-name">${item.name}</span>
                        </div>
                        <div class="input-section">
                            <div class="input-wrapper">
                                <input type="number" 
                                       id="input-${item.code}" 
                                       inputmode="decimal" 
                                       placeholder="0"
                                       value=""
                                       oninput="handleInput(this, '${item.code}')"
                                       ${isCardActive ? '' : 'readonly'}>
                            </div>
                            <div class="rate-memo" id="memo-${item.code}">---</div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });

            fetchLatestRates();
        }

        // 核心计算逻辑：无论你输入谁，都先换算成中间变量 USD，再由 USD 扩散折算给其他所有货币
        function updateAllValues() {
            // 获取当前输入币种对美元的汇率
            const activeRateToUSD = exchangeRates[currentActiveCode];
            // 计算出当前的等值美元数量
            const amountInUSD = currentInputValue / activeRateToUSD;

            currencies.forEach(item => {
                const inputField = document.getElementById(`input-${item.code}`);
                const memoField = document.getElementById(`memo-${item.code}`);
                
                // 1. 更新各输入框的数值（正在输入的框不更新，防止光标乱跳）
                if (item.code !== currentActiveCode) {
                    const targetRate = exchangeRates[item.code];
                    const finalValue = amountInUSD * targetRate;
                    // 日元不保留小数，其余保留2位
                    inputField.value = isNaN(finalValue) ? '' : finalValue.toFixed(item.code === 'JPY' ? 0 : 2);
                }

                // 2. 更新下方的小字汇率备忘录（直观显示 1本币 ≈ 多少其他外币）
                if (item.code === currentActiveCode) {
                    memoField.innerText = "当前基准输入";
                } else {
                    const fromRate = exchangeRates[currentActiveCode];
                    const toRate = exchangeRates[item.code];
                    const perUnit = (1 / fromRate) * toRate;
                    memoField.innerText = `1 ${currentActiveCode} ≈ ${perUnit.toFixed(4)} ${item.code}`;
                }
            });
        }

        // 当用户点击某一张卡片时触发
        function focusCard(code) {
            if (currentActiveCode === code) return;

            // 取消上一个卡片的高亮和输入状态
            const oldCard = document.getElementById(`card-${currentActiveCode}`);
            const oldInput = document.getElementById(`input-${currentActiveCode}`);
            if (oldCard) oldCard.classList.remove('active');
            if (oldInput) oldInput.setAttribute('readonly', true);

            // 激活当前点击的卡片
            currentActiveCode = code;
            const newCard = document.getElementById(`card-${code}`);
            const newInput = document.getElementById(`input-${code}`);
            
            newCard.classList.add('active');
            newInput.removeAttribute('readonly');
            
            // 切换时，把当前框里的数值作为新的基准数
            currentInputValue = parseFloat(newInput.value) || 0;
            
            newInput.focus();
            // iOS 丝滑体验：选中文字方便一键覆盖输入
            setTimeout(() => newInput.setSelectionRange(0, newInput.value.length), 50);
            
            updateAllValues();
        }

        // 监听键盘输入
        function handleInput(element, code) {
            currentInputValue = parseFloat(element.value) || 0;
            updateAllValues();
        }

        // 联网获取最新全球汇率
        async function fetchLatestRates() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                if (data && data.rates) {
                    // 更新本地汇率表
                    currencies.forEach(item => {
                        if (data.rates[item.code]) {
                            exchangeRates[item.code] = data.rates[item.code];
                        }
                    });
                    const now = new Date();
                    document.getElementById('updateTime').innerText = `已连接实时网络 · 更新于 ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                }
            } catch (error) {
                document.getElementById('updateTime').innerText = "⚠️ 无法连接实时网络，已启动本地高精度缓存";
            } finally {
                // 初始化默认显示：在人民币输入100
                document.getElementById('input-CNY').value = 100;
                currentActiveCode = 'CNY';
                currentInputValue = 100;
                updateAllValues();
            }
        }

        // 启动 App
        window.onload = initApp;
    </script>
</body>
</html>
